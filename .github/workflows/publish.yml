name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact reviewed package source commit.
        required: true
        default: 57a5790d0e4c6665dcfab5f66ff5243adb6a3851
        type: string

permissions: {}

jobs:
  build:
    name: Build reviewed source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      source_sha: ${{ steps.source.outputs.sha }}
      wheel_sha256: ${{ steps.hashes.outputs.wheel_sha256 }}
      sdist_sha256: ${{ steps.hashes.outputs.sdist_sha256 }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 1
      - id: source
        name: Verify reviewed source
        run: |
          set -euo pipefail
          expected='${{ inputs.source_sha }}'
          test "$expected" = '57a5790d0e4c6665dcfab5f66ff5243adb6a3851'
          actual=$(git rev-parse HEAD)
          test "$actual" = "$expected"
          echo "sha=$actual" >> "$GITHUB_OUTPUT"
          echo "- Source SHA: $actual" >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build and inspect distributions
        id: hashes
        run: |
          set -euo pipefail
          python -m pip install "build>=1.2" "twine>=6"
          python -m build
          python -m twine check --strict dist/*

          shopt -s nullglob
          wheels=(dist/*.whl)
          sdists=(dist/*.tar.gz)
          (( ${#wheels[@]} == 1 ))
          (( ${#sdists[@]} == 1 ))

          wheel_sha256=$(sha256sum "${wheels[0]}" | awk '{print $1}')
          sdist_sha256=$(sha256sum "${sdists[0]}" | awk '{print $1}')
          echo "wheel_sha256=$wheel_sha256" >> "$GITHUB_OUTPUT"
          echo "sdist_sha256=$sdist_sha256" >> "$GITHUB_OUTPUT"
          {
            echo "- Wheel: $(basename "${wheels[0]}")"
            echo "  - SHA-256: $wheel_sha256"
            echo "- Sdist: $(basename "${sdists[0]}")"
            echo "  - SHA-256: $sdist_sha256"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish reviewed distributions
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi-production
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist
      - name: Verify artifact hashes
        env:
          EXPECTED_WHEEL_SHA256: ${{ needs.build.outputs.wheel_sha256 }}
          EXPECTED_SDIST_SHA256: ${{ needs.build.outputs.sdist_sha256 }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(dist/*.whl)
          sdists=(dist/*.tar.gz)
          (( ${#wheels[@]} == 1 ))
          (( ${#sdists[@]} == 1 ))
          test "$(sha256sum "${wheels[0]}" | awk '{print $1}')" = "$EXPECTED_WHEEL_SHA256"
          test "$(sha256sum "${sdists[0]}" | awk '{print $1}')" = "$EXPECTED_SDIST_SHA256"
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  verify-production:
    name: Verify production install
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install from production PyPI and run Runtime smoke
        env:
          PIP_CONFIG_FILE: /dev/null
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
          PIP_KEYRING_PROVIDER: disabled
          PIP_NO_INPUT: "1"
        run: |
          set -euo pipefail
          VENV_DIR="$RUNNER_TEMP/observable-library-production-verify"
          RUN_DIR="$RUNNER_TEMP/observable-library-production-runtime-smoke"
          python -m venv "$VENV_DIR"
          mkdir -p "$RUN_DIR"
          cd "$RUN_DIR"
          "$VENV_DIR/bin/python" -m pip install --no-cache-dir --index-url https://pypi.org/simple "observable-library==0.1.0"
          "$VENV_DIR/bin/python" -m pip check
          "$VENV_DIR/bin/python" - <<'PY'
          import os
          from pathlib import Path

          import torch
          import observable_library as ol

          package_file = Path(ol.__file__).resolve()
          checkout = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          assert checkout not in package_file.parents

          model = torch.nn.Sequential(torch.nn.Linear(2, 1, bias=False))
          source = ol.HookSource(model)
          observable = ol.Observable(
              spec=ol.ObservableSpec(
                  source="grad.0.weight",
                  selector="all",
                  reduction="l2_norm",
              ),
              compute=lambda tensors, _context: tensors["grad.0.weight"].norm(),
          )
          runtime = ol.Runtime([observable], source=source)

          source.attach()
          loss = model(torch.tensor([[2.0, 3.0]])).sum()
          loss.backward()
          values = runtime.observe(step=0)
          source.detach()

          assert values[observable.spec.id].item() > 0
          print(package_file)
          PY
